# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=ecommerce_super_secret_key_must_be_at_least_256_bits_long_for_hs256
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:4200

# External Product API (FakeStoreAPI - free, no key needed)
external.api.products=https://fakestoreapi.com/products
external.api.categories=https://fakestoreapi.com/products/categories

# Scheduler: auto-fetch products every 24 hours
product.sync.cron=0 0 0 * * ?

# Logging
logging.level.com.ecommerce=DEBUG
